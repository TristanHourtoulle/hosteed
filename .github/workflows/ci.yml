name: CI - Pull Request Validation

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [staging]

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run linter
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build application
        run: pnpm build
        env:
          # Minimal env vars for build
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          AUTH_SECRET: "ci-test-secret-not-for-production"
          NEXT_PUBLIC_SEND_MAIL: "false"
          BREVO_API_KEY: "xkeysib-fake-key-for-ci"
          BREVO_SENDER_EMAIL: "test@test.com"
          BREVO_SENDER_NAME: "Test"
          STRIPE_SECRET_KEY: "sk_test_fake_key_for_ci"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_fake_key_for_ci"

  # Optional: Run tests if you have them
